name: 'Setup Build Environment'
description: 'Clones dependencies and exports mkbootimg/avbtool paths'

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        echo "== Creating directories =="
        mkdir -p "$GITHUB_WORKSPACE/kernel"
        mkdir -p "$GITHUB_WORKSPACE/git-repo"

        echo "== Installing repo tool =="
        curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
        chmod +x "$GITHUB_WORKSPACE/git-repo/repo"
        echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"

        echo "== Cloning kernel patches =="
        rm -rf "$GITHUB_WORKSPACE/kernel_patches"
        git clone --depth=1 https://github.com/WildKernels/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"

        echo "== Cloning AnyKernel3 =="
        rm -rf "$GITHUB_WORKSPACE/AnyKernel3"
        git clone --depth=1 https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 "$GITHUB_WORKSPACE/AnyKernel3"

        echo "== Cloning build tools (FIXED) =="
        rm -rf "$GITHUB_WORKSPACE/kernel-build-tools"
        git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools kernel-build-tools

        echo "== Cloning mkbootimg (FIXED) =="
        rm -rf "$GITHUB_WORKSPACE/mkbootimg"
        git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg mkbootimg

        echo "== Exporting environment variables =="
        echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> "$GITHUB_ENV"
        echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> "$GITHUB_ENV"
        echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> "$GITHUB_ENV"

        echo "== Preparing AVB key path =="
        mkdir -p "$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb"
        KEY_PATH="$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem"

        if [ -z "${BOOT_SIGN_KEY:-}" ]; then
          echo "No BOOT_SIGN_KEY provided, skipping signing key setup"
        else
          echo "Using provided BOOT_SIGN_KEY"
          printf '%s' "$BOOT_SIGN_KEY" > "$KEY_PATH"

          if ! head -n 1 "$KEY_PATH" | grep -q 'BEGIN'; then
            printf '%s' "$BOOT_SIGN_KEY" | base64 -d > "$KEY_PATH"
          fi

          chmod 600 "$KEY_PATH"
        fi

        echo "BOOT_SIGN_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

        echo "== Setup completed successfully =="

name: 'Setup Cache and Build Environment'

inputs:
  android_version:
    required: true
  kernel_version:
    required: true
  sublevel:
    required: false

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        echo '== Installing ccache =='
        sudo apt-get update
        sudo apt-get install -y ccache

        echo '== ccache binary =='
        ccache --version

        echo '== Setting up ccache =='
        export CCACHE_DIR="/home/runner/.ccache"
        export CCACHE_BASEDIR="$GITHUB_WORKSPACE"
        mkdir -p "$CCACHE_DIR"

        ccache --max-size=12G
        ccache --set-config=compression=true
        ccache --set-config=compression_level=9

        echo '== ccache config =='
        ccache -p

        echo '== Exporting environment =='
        {
          echo "CCACHE_DIR=$CCACHE_DIR"
          echo "CCACHE_BASEDIR=$CCACHE_BASEDIR"
          echo "USE_CCACHE=1"
        } >> "$GITHUB_ENV"

        echo '== Cache setup complete =='

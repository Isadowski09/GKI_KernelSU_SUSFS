name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'

runs:
  using: composite
  steps:
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail

      # ========================
      # Define compiler variables
      # ========================
      export CC=clang
      export CXX=clang++
      export HOSTCC=gcc
      export HOSTCXX=g++
      export LD=ld
      export HOSTLD=ld

      echo "== Compiler variables set =="
      echo "CC=$CC"
      echo "CXX=$CXX"
      echo "HOSTCC=$HOSTCC"
      echo "HOSTCXX=$HOSTCXX"
      echo "LD=$LD"
      echo "HOSTLD=$HOSTLD"

      # ========================
      # Build kernel
      # ========================
      if [ -f "build/build.sh" ]; then
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        SKIP_MRPROPER=1 \
        LTO=thin \
        GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment" \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="$CC" \
        CXX="$CXX" \
        HOSTCC="$HOSTCC" \
        HOSTCXX="$HOSTCXX" \
        LD="$LD" \
        HOSTLD="$HOSTLD"
      else
        cp "$GITHUB_WORKSPACE/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
        tools/bazel build \
          --linkopt="--thinlto-cache-dir=/home/runner/.ld_cache" \
          --config=fast \
          --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment \
          --disk_cache="$BAZEL_CACHE_DIR" \
          //common:kernel_aarch64
      fi
